    M 8,8
    L 92,8
    L 92,16 Q 88,21 92,26 Q 88,31 92,36 Q 88,41 92,46 Q 88,51 92,56
    L 8,56
    L 8,46 Q 12,41 8,36 Q 12,31 8,26 Q 12,21 8,16
    Z
  " fill="#d9b020" opacity="0.8"/>

  <!-- Pouch body (inner area) -->
  <rect x="12" y="12" width="76" height="40" fill="#f5cc30"/>

  <!-- Top sheen -->
  <ellipse cx="50" cy="24" rx="28" ry="8" fill="rgba(255,255,200,0.35)"/>

  <!-- Mesh texture dots -->
  <g fill="rgba(100,60,0,0.18)">
    <circle cx="22" cy="22" r="1.4"/><circle cx="30" cy="22" r="1.4"/><circle cx="38" cy="22" r="1.4"/>
    <circle cx="46" cy="22" r="1.4"/><circle cx="54" cy="22" r="1.4"/><circle cx="62" cy="22" r="1.4"/>
    <circle cx="70" cy="22" r="1.4"/><circle cx="78" cy="22" r="1.4"/>

    <circle cx="18" cy="30" r="1.4"/><circle cx="26" cy="30" r="1.4"/><circle cx="34" cy="30" r="1.4"/>
    <circle cx="42" cy="30" r="1.4"/><circle cx="50" cy="30" r="1.4"/><circle cx="58" cy="30" r="1.4"/>
    <circle cx="66" cy="30" r="1.4"/><circle cx="74" cy="30" r="1.4"/><circle cx="82" cy="30" r="1.4"/>

    <circle cx="22" cy="38" r="1.4"/><circle cx="30" cy="38" r="1.4"/><circle cx="38" cy="38" r="1.4"/>
    <circle cx="46" cy="38" r="1.4"/><circle cx="54" cy="38" r="1.4"/><circle cx="62" cy="38" r="1.4"/>
    <circle cx="70" cy="38" r="1.4"/><circle cx="78" cy="38" r="1.4"/>

    <circle cx="26" cy="46" r="1.4"/><circle cx="34" cy="46" r="1.4"/><circle cx="42" cy="46" r="1.4"/>
    <circle cx="50" cy="46" r="1.4"/><circle cx="58" cy="46" r="1.4"/><circle cx="66" cy="46" r="1.4"/>
  </g>

  <!-- Left edge -->
  <path d="M 8,8 Q 12,13 8,18 Q 12,23 8,28 Q 12,33 8,38 Q 12,43 8,48 Q 12,53 8,56"
        fill="none" stroke="#a07010" stroke-width="1.2"/>
  <!-- Right edge -->
  <path d="M 88,8 Q 92,13 88,18 Q 92,23 88,28 Q 92,33 88,38 Q 92,43 88,48 Q 92,53 88,56"
