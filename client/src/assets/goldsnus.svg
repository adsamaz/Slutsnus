<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <g transform="translate(0, 15)">
  <!-- Shadow -->
  <ellipse cx="50" cy="66" rx="36" ry="3.5" fill="rgba(0,0,0,0.08)"/>

  <!-- Crimped flange (outer area behind pouch body) -->
