<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <g transform="translate(0, 15)">
  <!-- Residue/stain puddle -->
  <ellipse cx="50" cy="63" rx="38" ry="5.5" fill="rgba(50,28,6,0.20)"/>
  <ellipse cx="33" cy="65" rx="13" ry="3" fill="rgba(45,24,5,0.14)"/>

  <!-- Crimped flange (outer area) -->
  <path d="
    M 8,10
    L 92,10
    L 92,18 Q 88,23 92,28 Q 88,33 92,38 Q 88,43 92,48 Q 88,53 92,58
    L 8,58
    L 8,48 Q 12,43 8,38 Q 12,33 8,28 Q 12,23 8,18
    Z
  " fill="#6b4f30" opacity="0.55"/>

  <!-- Pouch body -->
  <rect x="12" y="14" width="76" height="40" fill="#5a4128"/>

  <!-- Darker stained patches -->
  <ellipse cx="38" cy="31" rx="18" ry="10" fill="rgba(25,12,2,0.42)"/>
  <ellipse cx="67" cy="42" rx="11" ry="6" fill="rgba(22,10,2,0.36)"/>

  <!-- Wrinkled top surface -->
  <ellipse cx="50" cy="22" rx="26" ry="5" fill="rgba(75,50,25,0.28)"/>

  <!-- Mesh texture dots -->
  <g fill="rgba(18,8,1,0.24)">
    <circle cx="22" cy="24" r="1.4"/><circle cx="30" cy="24" r="1.4"/><circle cx="38" cy="24" r="1.4"/>
    <circle cx="46" cy="24" r="1.4"/><circle cx="54" cy="24" r="1.4"/><circle cx="62" cy="24" r="1.4"/>
    <circle cx="70" cy="24" r="1.4"/><circle cx="78" cy="24" r="1.4"/>

    <circle cx="18" cy="32" r="1.4"/><circle cx="26" cy="32" r="1.4"/><circle cx="34" cy="32" r="1.4"/>
    <circle cx="42" cy="32" r="1.4"/><circle cx="50" cy="32" r="1.4"/><circle cx="58" cy="32" r="1.4"/>
    <circle cx="66" cy="32" r="1.4"/><circle cx="74" cy="32" r="1.4"/><circle cx="82" cy="32" r="1.4"/>

    <circle cx="22" cy="40" r="1.4"/><circle cx="30" cy="40" r="1.4"/><circle cx="38" cy="40" r="1.4"/>
    <circle cx="46" cy="40" r="1.4"/><circle cx="54" cy="40" r="1.4"/><circle cx="62" cy="40" r="1.4"/>
    <circle cx="70" cy="40" r="1.4"/><circle cx="78" cy="40" r="1.4"/>

    <circle cx="26" cy="48" r="1.4"/><circle cx="34" cy="48" r="1.4"/><circle cx="42" cy="48" r="1.4"/>
    <circle cx="50" cy="48" r="1.4"/><circle cx="58" cy="48" r="1.4"/><circle cx="66" cy="48" r="1.4"/>
  </g>

  <!-- Left edge -->
  <path d="M 8,10 Q 12,15 8,20 Q 12,25 8,30 Q 12,35 8,40 Q 12,45 8,50 Q 12,55 8,58"
        fill="none" stroke="#8a6840" stroke-width="1.2"/>
  <!-- Right edge -->
  <path d="M 88,10 Q 92,15 88,20 Q 92,25 88,30 Q 92,35 88,40 Q 92,45 88,50 Q 92,55 88,58"
        fill="none" stroke="#8a6840" stroke-width="1.2"/>

  <!-- Inner seam line -->
  <rect x="12" y="14" width="76" height="40"
        fill="none" stroke="rgba(110,80,45,0.50)" stroke-width="1"/>

  <!-- Loose crumble bits -->
  <circle cx="20" cy="60" r="1.8" fill="rgba(55,32,10,0.55)"/>
  <circle cx="32" cy="63" r="1.2" fill="rgba(55,32,10,0.45)"/>
  <circle cx="60" cy="62" r="1.5" fill="rgba(55,32,10,0.50)"/>
  <circle cx="74" cy="59" r="1.2" fill="rgba(55,32,10,0.40)"/>
  <circle cx="46" cy="64" r="1.0" fill="rgba(55,32,10,0.38)"/>
  </g>
</svg>
